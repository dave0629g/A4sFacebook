# ════════════════════════════════════════════════════════════════
#  提供資料.yaml ── 由「維護這個 repo 的人（搭檔）」填寫；小編不用碰這個檔
#  維護者把小編交來的值，填在每個「:」後面的引號裡就好
#
#  填完存檔，到專案根目錄執行：   python3 素材/update.py
#  程式會做三件事：
#    ① 把「可直接複製貼出的成品」（貼文 1–5、私訊、LINE）寫到  素材/成品/
#    ② 更新進度與下一個死線到  素材/狀態.md
#    ③ 把 素材/收件匣/ 的檔案歸位、清點原圖來源
#
#  規則：
#    ‣ 還沒拿到的就【留空】（""），程式會在成品裡保留【佔位】，一看就知道還缺什麼
#    ‣ 這份檔案本身不進 git（已被 .gitignore 排除），但仍請守個資紅線：
#    ‣ 真實姓名、電話、身分證、戶籍、稅務資料【一律不要填這裡】——那些只存共用資料夾試算表
#    ‣ 得獎名單只填「遮蔽版」（王Ｏ明 這種格式）
#
#  第一次用：update.py 會自動把這個範本複製成 提供資料.yaml
# ════════════════════════════════════════════════════════════════

連結:
  共用資料夾: ""
  認領名單試算表: ""
  辦法文件: ""
  辦法短網址: ""          # 文案的【辦法短網址】會帶這個
  管理試算表: ""
  表單回覆者連結: ""       # 給填答者用的那條，不是編輯連結
  短網址A: ""             # 私訊專用（02 私訊、05 LINE）；文案的【短網址】
  短網址B: ""             # 貼文專用（03 FB 貼文）；文案的【短網址B】
  第一波相簿: ""
  貼文1: ""
  第二波相簿: ""
  貼文2_5: ""
  開獎貼文連結: ""        # 文案的【開獎貼文連結】

票選結果:                # 6/26 計票後
  第一名曲名: ""          # ＝冠軍曲名，成品會自動帶進「安可候選」那句
  第二名曲名: ""
  第三名曲名: ""
  參加人數: ""           # 去重有效「人數」（一人最多兩票，別填成票數）

得獎名單:                # 6/26 抽出，只填遮蔽版（王Ｏ明 格式）
  正取:                  # 5 位，照抽出順序
    - ""
    - ""
    - ""
    - ""
    - ""
  備取:                  # 2 位
    - ""
    - ""

聽後感:                  # 7/1 結案貼文用；只能挑「聽後感_可刊登」分頁（有勾同意）的留言
  - 引用: ""
    暱稱: ""
  - 引用: ""
    暱稱: ""
  - 引用: ""
    暱稱: ""

KPI:                     # 7/1 覆盤用數字（純數字，無個資）
  追蹤者_0612基準: ""     # 6/12 今晚記的精確值
  追蹤者_0701: ""
  活動前30日平均日增: ""
  私訊發送數: ""          # 認領名單試算表「首發已發✓」欄加總
  短網址A點擊: ""         # reurl 後台
  短網址B點擊: ""
  表單完成數: ""
  追蹤聲明占比: ""        # 進度分頁第 7 題
  Email訂閱數: ""
  各團員歸因分布_已抄存: false   # 進度分頁第 3 題（按⑥前要先抄到共用資料夾，否則永久消失）
  獎品總成本: ""

# 進度勾選（維護者依小編回報維護）：小編回報完成一項，就把對應的 false 改成 true（會反映在 狀態.md）
完成:
  辦法文件已建並設好權限: false        # 01 步驟 0；權限「知道連結者・檢視者」
  表單已建_自動關閉已設: false         # 6/25 21:00 自動關閉
  手機實測_表單OK: false              # Messenger＋LINE 內建瀏覽器，用短網址A 測
  手機實測_粉專追蹤者名單可開: false    # 領獎查核備用
  獎品價值證明_皆未超過1000: false
  獎品實物_各備5份: false             # 入場券 ×5、USB ×5
  計分方式已定案: false               # 建議 2/1 分，開票後不得改
  指揮同意安可候選用語: false           # 只承諾「候選」，留文字紀錄
  幹部備援權限_對方已接受: false        # 粉專管理員＋表單編輯
  gmail有人每日收信: false            # 無此信箱則辦法/表單聯絡方式改粉專私訊
  reurl帳密已記幹部文件: false
  訊息012已依序貼團員群組: false        # 05 的訊息 0→1→2
  第一波照片已審片: false
  第二波照片已審片: false
  排除名單已填: false                 # 測試暱稱＋團員家屬
  人工判定已補登: false               # 之後就不要再按④
  轉盤名單已產生_按5: false           # 補登後才按⑤，抽獎用這份
  抽獎已錄影: false                   # 僅存證、不公開
  各團員已填名單已個別私訊_0618: false
  未領獎名單已個別私訊_0628: false
  稅務資料已抄存共用資料夾: false       # 按⑥前
  我的最愛操作已實測: false
  程式6已執行_個資已清_副本已留: false
