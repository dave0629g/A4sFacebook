# 小編任務（給 Streamlit 網頁顯示用）
# 改這份，網頁就更新。每個任務的「做」要短、好讀（小編眼力不好，字會放很大）。
# 欄位：階段(起/迄日期、標題、急迫)　任務(id 唯一、做、為什麼、交件)
# 日期格式 MM-DD；起=迄 代表單日。年份固定 2026。

階段:
  - id: p0612
    起: "06-12"
    迄: "06-12"
    標題: "今晚（過了就補不回來）"
    急迫: true
    任務:
      - id: t_kpi_num
        做: "記下粉專「追蹤者」現在的精確人數"
        為什麼: "明天數字就變了，這是算成效的起點"
        交件: "把數字給搭檔"
      - id: t_kpi_shot
        做: "Meta 洞察 → 追蹤者 → 截「過去 30 天淨增」圖"
        交件: "截圖存共用資料夾"
      - id: t_folder
        搭檔完成: true
        做: "共用資料夾（截圖、照片以後都丟這）"
      - id: t_claim_sheet
        搭檔完成: true
        做: "認領名單試算表（已含 39 位團員＋首發/提醒欄）"
      - id: t_rules_doc
        做: "活動辦法文件已建好（內容都填好了）；你只要把它「共用」改成「知道連結者・檢視者」"
        為什麼: "辦法可以給人看，但不能讓人改"
      - id: t_rules_url
        做: "用 reurl.cc（先登入）把辦法文件縮成短網址"
        交件: "辦法短網址給搭檔"
      - id: t_build_form
        做: "貼好自動化程式，點選單「① 建立表單」"
        為什麼: "30 秒建好全部題目"
      - id: t_autoclose
        做: "點「② 設定自動關閉」（確認 6/25 晚 9 點關）"
      - id: t_shorturl
        做: "取表單「回覆者連結」，縮成短網址 A（私訊）和 B（貼文）"
        交件: "兩條短網址＋管理試算表連結給搭檔"
      - id: t_test_form
        做: "手機用 Messenger 和 LINE 各開短網址 A 測一次表單"
        為什麼: "確認填得了、不用登入、送得出去"
      - id: t_test_followers
        做: "到粉專後台開一次「追蹤者名單」看打不打得開"

  - id: p0613
    起: "06-13"
    迄: "06-13"
    標題: "開跑前（全部好了才喊「可以發了」）"
    急迫: false
    任務:
      - id: t_prize_proof
        做: "拍獎品價值證明：入場券票面＋USB 發票/市價，確認都 ≤1000 元"
        交件: "兩張照片存共用資料夾"
      - id: t_post_012
        做: "把 05 的訊息 0 → 1 → 2 依序貼到團員群組"
      - id: t_go
        做: "幹部十項檢查全勾後，在群組喊「可以發了」"
        為什麼: "團員才開始發首發私訊"

  - id: p0614
    起: "06-14"
    迄: "06-15"
    標題: "第一波照片"
    急迫: false
    任務:
      - id: t_photo1_pick
        做: "6/14 選 25–30 張（演出＋謝幕）貼群組審片，註明 24 小時"
        為什麼: "不要單一觀眾特寫、有小孩的先抽掉"
      - id: t_photo1_post
        做: "6/15 上第一波相簿＋發 FB 貼文 1，記得置頂"
        交件: "相簿連結＋貼文連結給搭檔"

  - id: p0618
    起: "06-18"
    迄: "06-18"
    標題: "中場戰報"
    急迫: false
    任務:
      - id: t_progress
        做: "點選單「③ 更新進度報表」"
      - id: t_dm_filled
        做: "把各團員的「已填名單」個別私訊給每個人（別貼整張表）"
      - id: t_post_msg3
        做: "把 05 訊息 3（提醒模板）貼到團員群組"
      - id: t_post2
        做: "發 FB 貼文 2 戰報（只說「兩首咬很緊」，不說哪兩首）"
        交件: "總填答數、追蹤聲明比例、Email 訂閱數給搭檔"

  - id: p0620
    起: "06-20"
    迄: "06-21"
    標題: "第二波照片（提前一天送審）"
    急迫: false
    任務:
      - id: t_photo2_pick
        做: "6/20 選彩排/幕後/觀眾席 10–20 張，貼群組審片（留 24 小時）"
      - id: t_photo2_post
        做: "6/21 上第二波相簿＋發 FB 貼文 2.5＋LINE 訊息 13"
        交件: "相簿連結＋貼文連結給搭檔"

  - id: p0623
    起: "06-23"
    迄: "06-23"
    標題: "倒數"
    急迫: false
    任務:
      - id: t_post3
        做: "晚上 9 點排程發 FB 貼文 3（倒數），LINE 訊息 12 廣播"
        為什麼: "要對準 9 點，才接得上 6/25 截止"
      - id: t_post_msg4
        做: "把 05 訊息 4（最後召集模板）貼團員群組，讓團員私訊還沒投的人"

  - id: p0625
    起: "06-25"
    迄: "06-25"
    標題: "表單截止（系統自動）"
    急迫: false
    任務:
      - id: t_closed
        做: "晚上 9 點表單自動關，確認真的關了即可"

  - id: p0626
    起: "06-26"
    迄: "06-26"
    標題: "抽獎（順序不能反）"
    急迫: false
    任務:
      - id: t_exclude
        做: "「排除名單」填三種人：測試、有投票的團員本人、團員同住家屬"
        為什麼: "團員家屬可投票不抽獎；沒填會混進抽獎池"
      - id: t_count
        做: "點「④ 截止後整理＋計票」，處理「需人工判定」並補登"
      - id: t_wheel_list
        做: "補登完點「⑤」產生「轉盤名單」（之後別再按④）"
      - id: t_draw
        做: "≥2 幹部在場，wheelofnames 抽 7 位，全程錄影、每輪先截圖再 Remove"
        交件: "參加人數、前三名曲名、得獎名單遮蔽版、揭曉圖卡、7 張截圖給搭檔"

  - id: p0627
    起: "06-27"
    迄: "06-30"
    標題: "開獎＋領獎期"
    急迫: false
    任務:
      - id: t_post4
        做: "6/27 晚 8 點發 FB 貼文 4 開獎，置頂"
        交件: "開獎貼文連結給搭檔"
      - id: t_post_msg57
        做: "把 05 訊息 5、7 貼團員群組供轉傳"
        為什麼: "訊息 7 讓沒有 FB 的朋友也看得到完整結果"
      - id: t_verify
        做: "每位來領的做三重比對，登記獎項 A/B、領取方式（記共用資料夾）"
      - id: t_consent
        做: "要放結案貼文的合照，先拿到本人「可以刊登」同意＋截圖"
        為什麼: "合影是自願，不追蹤也照領"
      - id: t_remind_unclaimed
        做: "6/28–29 把「還沒來領的」個別私訊他的邀請團員"
      - id: t_backup
        做: "6/30 23:59 後還沒領的，備取遞補、留言區公告"

  - id: p0701
    起: "07-01"
    迄: "07-01"
    標題: "結案"
    急迫: false
    任務:
      - id: t_quotes
        做: "挑 3 則聽後感（只能從「聽後感_可刊登」分頁）＋暱稱"
        交件: "給搭檔"
      - id: t_fav_test
        做: "用最新 FB 實測「追蹤中→我的最愛」點法，跟文案不同就改字"
      - id: t_post5
        做: "發 FB 貼文 5 結案＋LINE 訊息 8"
      - id: t_backup_pii
        做: "按⑥前，先把聽後感、各團員歸因分布、稅務資料抄到共用資料夾"
        為什麼: "按⑥一跑就刪，救不回"
      - id: t_close6
        做: "點「⑥ 結案」，再做乾淨副本、刪原檔、清垃圾桶"
        交件: "逐項撈給搭檔：7/1 追蹤者精確數、短網址 A/B 點擊數、私訊發送數（認領表✓欄加總）"
